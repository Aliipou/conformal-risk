name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests --select E,W,F,I --ignore E501

      - name: Test
        run: pytest tests/ -q --tb=short --cov=conformal_risk --cov-report=term-missing

  coverage-badge:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install and run coverage
        run: |
          pip install -e ".[dev]"
          pytest tests/ -q --cov=conformal_risk --cov-report=xml
